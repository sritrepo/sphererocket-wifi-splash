<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sphere Rocket Wi-Fi</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin:0; background:#fff; color:#111; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 48px 18px; }
    .card { border: 1px solid #e8e8e8; border-radius: 14px; padding: 28px; box-shadow: 0 6px 18px rgba(0,0,0,0.04); }
    .row { display:flex; gap: 26px; align-items:flex-start; }
    .left { flex: 1.2; }
    .right { flex: 1; }
    img { max-width: 220px; height:auto; display:block; margin: 0 auto 22px auto; }
    h2 { font-size: 30px; margin: 0 0 10px 0; }
    p { margin: 0 0 14px 0; color:#444; line-height:1.45; }
    label { display:block; font-size: 12px; letter-spacing: .05em; color:#666; margin: 12px 0 6px; text-transform: uppercase; }
    input { width:88%; padding: 12px 12px; border:1px solid #ddd; border-radius: 10px; font-size: 16px; }
    button { width:95%; margin-top: 14px; padding: 14px 14px; border:0; border-radius: 10px; font-size: 16px; cursor:pointer; background: #111; color: #fff; }
    button:disabled { opacity: 0.6; cursor:not-allowed; }
    .fine { font-size: 12px; color:#777; margin-top: 12px; }
    .error { margin-top: 10px; color: #b00020; font-size: 14px; }
    .ok { margin-top: 10px; color: #0a7a2f; font-size: 14px; }
   
    @media (max-width: 820px) { .row { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="row">
        <div class="left">
          <img class="srlogo" src="./logo.webp" alt="Sphere Rocket">
          <h2>Connect to Sphere Rocket Wi-Fi</h2>
          <p>Enter your name + email to get instant internet access.</p>
          <p class="fine">This helps us share event resources and updates after today.</p>
        </div>
        <div class="right">
          <form id="wifiForm" name="wifi-leads" netlify>
            <input type="hidden" name="form-name" value="wifi-leads" />

            <label for="name">Name</label>
            <input id="name" name="name" autocomplete="name" required />

            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />

            <label for="tel">Phone Number</label>
            <input type="tel" id="phone" name="phone" autocomplete="tel" required />

            <button id="btn" type="submit">Continue</button>
            <div id="msg" class=""></div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const base_grant_url = qs.get("base_grant_url");
    const user_continue_url = qs.get("user_continue_url");
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");

    // CONFIGURATION: Set your custom destination here
    const WELCOME_PAGE = "https://sphererocketva.com/wifi";

    function setMsg(text, cls) {
      msg.className = cls || "";
      msg.textContent = text || "";
    }

    document.getElementById("wifiForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true;
      setMsg("Connecting to Wi-Fi...", "fine");

      const myForm = e.target;
      const formData = new FormData(myForm);

      try {
        // Validation: Meraki needs the base_grant_url to work
        if (!base_grant_url) {
            throw new Error("Portal parameters missing. Please try reconnecting to the Wi-Fi.");
        }

        // 1. POST to Netlify Forms (Background sync)
        fetch("/", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams(formData).toString(),
        }).catch(() => console.log("Netlify Form sync failed (non-critical)"));

        // 2. POST to Grant Function (Triggers Meraki Auth)
        const res = await fetch("/.netlify/functions/grant", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: formData.get("name"),
            email: formData.get("email"),
            phone: formData.get("phone"),
            base_grant_url,
            user_continue_url
          })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Grant failed.");

        setMsg("Success! Redirecting...", "ok");
        
        // 3. THE "SILENT GRANT" & REDIRECT
        // We ping the grant URL in the background to 'unlock' the Wi-Fi.
        // keepalive: true ensures the request finishes even if the page unloads.
        const grantTarget = data.redirect || base_grant_url;
        
        fetch(grantTarget, { 
          mode: 'no-cors',
          keepalive: true
        }).finally(() => {
          // Give the router 1.5 seconds to register the "Grant" before moving away
          setTimeout(() => {
            window.location.href = WELCOME_PAGE;
          }, 1500);
        });

      } catch (err) {
        setMsg(err.message, "error");
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
