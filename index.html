<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sphere Rocket Wi-Fi</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin:0; background:#fff; color:#111; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 48px 18px; }
    .card { border: 1px solid #e8e8e8; border-radius: 14px; padding: 28px; box-shadow: 0 6px 18px rgba(0,0,0,0.04); }
    .row { display:flex; gap: 26px; align-items:flex-start; }
    .left { flex: 1.2; }
    .right { flex: 1; }
    img { max-width: 220px; height:auto; display:block; margin: 0 auto 22px auto; }
    h2 { font-size: 30px; margin: 0 0 10px 0; }
    p { margin: 0 0 14px 0; color:#444; line-height:1.45; }
    label { display:block; font-size: 12px; letter-spacing: .05em; color:#666; margin: 12px 0 6px; text-transform: uppercase; }
    input { width:88%; padding: 12px 12px; border:1px solid #ddd; border-radius: 10px; font-size: 16px; }
    button { width:95%; margin-top: 14px; padding: 14px 14px; border:0; border-radius: 10px; font-size: 16px; cursor:pointer; }
    button:disabled { opacity: 0.6; cursor:not-allowed; }
    .fine { font-size: 12px; color:#777; margin-top: 12px; }
    .error { margin-top: 10px; color: #b00020; font-size: 14px; }
    .ok { margin-top: 10px; color: #0a7a2f; font-size: 14px; }
   
    @media (max-width: 820px) { .row { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="row">
        <div class="left">
          <img class="srlogo" src="./logo.webp" alt="Sphere Rocket">
          <h2>Connect to Sphere Rocket Wi-Fi</h1>
          <p>Enter your name + email to get instant internet access.</p>
          <p class="fine">This helps us share event resources and updates after today.</p>
        </div>
        <div class="right">
          <form id="wifiForm">
            <label for="name">Your name</label>
            <input id="name" name="name" autocomplete="name" required />

            <label for="email">Your email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />

            <button id="btn" type="submit">Continue</button>
            <div id="msg" class=""></div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const base_grant_url = qs.get("base_grant_url");
    const user_continue_url = qs.get("user_continue_url");

    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    function setMsg(text, cls) {
      msg.className = cls || "";
      msg.textContent = text || "";
    }

    if (!base_grant_url || !user_continue_url) {
      setMsg("Preview mode: open this page from the Wi-Fi captive portal to test the real flow.", "fine");
    }

    document.getElementById("wifiForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      setMsg("", "");
      btn.disabled = true;

      try {
        if (!base_grant_url || !user_continue_url) {
          throw new Error("Missing Meraki parameters. This page must be opened from the captive portal.");
        }

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();

        setMsg("Connecting…", "fine");

        const res = await fetch("/.netlify/functions/grant", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, base_grant_url, user_continue_url })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Could not unlock Wi-Fi. Try again.");

        setMsg("Connected. Redirecting…", "ok");
        window.location.href = data.redirect || user_continue_url;

      } catch (err) {
        setMsg(err.message || "Something went wrong.", "error");
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
